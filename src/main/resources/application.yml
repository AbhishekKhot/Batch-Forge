spring:
  application:
    name: batchforge

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/batchforge}
    username: ${DB_USERNAME:batchforge}
    password: ${DB_PASSWORD:batchforge}
    hikari:
      pool-name: batchforge-cp
      maximum-pool-size: ${DB_POOL_MAX:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:4}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:batchforge}
    password: ${RABBITMQ_PASSWORD:batchforge}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:batchforge}

batchforge:
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:batchforge}
    secret-key: ${MINIO_SECRET_KEY:batchforge}
    bucket: ${MINIO_BUCKET:batchforge}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.batchforge: DEBUG